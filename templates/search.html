<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Search – UrbanCart</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');
  body{margin:0;padding:0;font-family:'Roboto',sans-serif;background:linear-gradient(to bottom,#0f1c2f,#0a3d62,#0b5a8e,#052f4f);color:white;}
  header{padding:20px;text-align:center;font-size:2em;font-weight:bold;}
  nav{display:flex;justify-content:center;align-items:center;gap:20px;flex-wrap:wrap;background:rgba(255,255,255,0.2);padding:10px;backdrop-filter:blur(5px);border-radius:0 0 20px 20px;margin-bottom:20px;}
  nav a{color:white;text-decoration:none;font-weight:bold;}nav a:hover{color:#facc15;}
  .cart-count-badge{background:#facc15;color:#000;border-radius:50%;padding:1px 6px;font-size:.75em;font-weight:700;margin-left:3px;}
  .search-meta{text-align:center;font-size:.9em;color:rgba(255,255,255,.65);margin-bottom:16px;padding:0 20px;}
  .search-meta strong{color:#facc15;}
  .products{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:30px;padding:0 50px 50px;}
  .product-card{background:rgba(255,255,255,0.9);color:black;border-radius:20px;padding:20px;text-align:center;box-shadow:0 5px 20px rgba(0,0,0,.25);transition:.3s;position:relative;}
  .product-card:hover{transform:translateY(-10px);}
  .product-card img,.prod-emoji{width:100%;height:220px;object-fit:cover;border-radius:15px;}
  .prod-emoji{display:flex;align-items:center;justify-content:center;font-size:5rem;background:#f0f4f8;}
  .product-card h3{margin:12px 0 6px;color:#0ea5a4;font-size:1.1em;cursor:pointer;}
  .prod-rating{display:inline-block;background:#22c55e;color:white;font-size:.72em;font-weight:700;padding:2px 7px;border-radius:20px;margin-bottom:8px;}
  .prod-prices{display:flex;align-items:baseline;justify-content:center;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
  .prod-price{font-size:1.05em;font-weight:700;} .prod-mrp{font-size:.8em;color:#aaa;text-decoration:line-through;} .prod-disc{font-size:.78em;color:#22c55e;font-weight:700;}
  .buttons{display:flex;justify-content:center;gap:8px;}
  .product-card button{padding:8px 16px;background:#facc15;border:none;border-radius:10px;font-weight:bold;cursor:pointer;transition:.3s;font-family:'Roboto',sans-serif;font-size:.88em;}
  .product-card button:hover{background:#8b5cf6;color:white;}
  .wish-card-btn{position:absolute;top:10px;right:10px;background:rgba(255,255,255,.9);border:none;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:.9em;padding:0;box-shadow:0 2px 6px rgba(0,0,0,.2);}
  .wish-card-btn:hover{transform:scale(1.15);}
  .empty-msg{text-align:center;font-size:1.2em;padding:60px;color:rgba(255,255,255,.7);}
  .empty-msg a{display:inline-block;margin-top:16px;padding:11px 24px;background:#facc15;color:#000;border-radius:12px;font-weight:700;text-decoration:none;}
  .empty-msg a:hover{background:#8b5cf6;color:white;}
  footer{padding:20px;text-align:center;color:white;}
  @media(max-width:768px){.products{padding:0 15px 40px;}}
</style></head>
<body>
<header>🔍 Search Results</header>
<nav id="main-nav"><a href="/">Home</a><a href="/products">Shop</a><a href="/cart">Cart <span class="cart-count-badge" style="display:none"></span></a></nav>

<div class="search-meta" id="search-meta">Searching for "<strong>{{ q }}</strong>"…</div>
<div class="products" id="sgrid"></div>

<footer>© <span class="year"></span> UrbanCart</footer>
<script src="/static/js/main.js"></script>
<script>
async function doSearch(){
  const q={{ q|tojson }};
  const grid=document.getElementById('sgrid');
  const meta=document.getElementById('search-meta');
  if(!q){grid.innerHTML='<div class="empty-msg">Enter a search term above.<br><a href="/products">Browse All</a></div>';return;}
  try{
    const products=await api(`/api/products?q=${encodeURIComponent(q)}`);
    meta.innerHTML=`${products.length} result${products.length!==1?'s':''} for "<strong style="color:#facc15;">${q}</strong>"`;
    if(!products.length){grid.innerHTML='<div class="empty-msg">No results found.<br><a href="/products">Browse All Products</a></div>';return;}
    grid.innerHTML=products.map(p=>{
      const disc=p.mrp>p.price?Math.round((1-p.price/p.mrp)*100):0;
      return `<div class="product-card">
        <button class="wish-card-btn" onclick="toggleWishlist(${p.id},this)">🤍</button>
        ${p.img?`<img src="${p.img}" alt="${p.name}" onerror="this.outerHTML='<div class=prod-emoji>${p.emoji}</div>'" onclick="location.href='/product/${p.id}'" style="cursor:pointer;">`:`<div class="prod-emoji" onclick="location.href='/product/${p.id}'" style="cursor:pointer;">${p.emoji}</div>`}
        <h3 onclick="location.href='/product/${p.id}'">${p.name}</h3>
        <div class="prod-rating">★ ${p.rating}</div>
        <div class="prod-prices">
          <span class="prod-price">₹${Math.round(p.price).toLocaleString('en-IN')}</span>
          ${disc>0?`<span class="prod-mrp">₹${Math.round(p.mrp).toLocaleString('en-IN')}</span><span class="prod-disc">${disc}% off</span>`:''}
        </div>
        <div class="buttons">
          <button onclick="addToCart(${p.id},this)">Add to Cart</button>
          <button onclick="location.href='/product/${p.id}'">View</button>
        </div>
      </div>`;
    }).join('');
  }catch(e){grid.innerHTML=`<div class="empty-msg">${e.message}</div>`;}
}
doSearch();
</script>
</body></html>
